version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: clearbalance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clearbalance
      POSTGRES_PASSWORD: clearbalance
      POSTGRES_DB: clearbalance
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clearbalance -d clearbalance"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    driver: local
