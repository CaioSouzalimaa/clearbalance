services:
  postgres:
    image: postgres:16-alpine
    container_name: clearbalance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PGDATABASE:-clearbalance}
      POSTGRES_USER: ${PGUSER:-clearbalance}
      POSTGRES_PASSWORD: ${PGPASSWORD:-clearbalance}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
